<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>Emberwing — Dragon Flight</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: none; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0b0818; position: fixed; }
    canvas { display: block; touch-action: none; }
    #errorBanner {
      display: none; position: fixed; inset: 0; z-index: 999; background: #1a0a0a;
      color: #ffb3b3; font-family: monospace; font-size: 13px; padding: 20px;
      overflow: auto; white-space: pre-wrap; line-height: 1.5;
    }
  </style>
</head>
<body>
  <div id="errorBanner"></div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
